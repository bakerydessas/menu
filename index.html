<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dessa's Bakery - Menu Interativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fafafa;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            color: #262626;
        }

        /* Simulador de Celular */
        .app-container {
            width: 100%;
            max-width: 414px;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            padding-bottom: 120px; 
        }

        /* Header estilo Instagram */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            border-bottom: 1px solid #dbdbdb;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-family: 'Grand Hotel', cursive;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Conteúdo e Cards */
        .content { padding: 20px; }
        .section-title {
            font-size: 14px; font-weight: 700; color: #8e8e8e;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 15px; margin-top: 10px;
        }
        .card {
            background: #ffffff; border: 1px solid #dbdbdb;
            border-radius: 8px; padding: 15px; margin-bottom: 25px;
        }
        .category-title {
            font-size: 16px; font-weight: 600; margin-bottom: 10px;
            display: flex; align-items: center;
        }
        .ig-gradient-text {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-right: 8px;
        }

        /* Checklists */
        .item-list { list-style: none; margin-bottom: 20px; }
        .item-list label {
            display: flex; align-items: center;
            font-size: 14px; padding: 10px 0;
            border-bottom: 1px solid #efefef; cursor: pointer;
        }
        .item-list label:last-child { border-bottom: none; }
        .item-list input[type="checkbox"] {
            margin-right: 12px;
            width: 18px; height: 18px;
            accent-color: #e6683c;
            cursor: pointer;
        }

        /* Grid de Tamanhos */
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .price-label {
            background: #fafafa; border: 1px solid #dbdbdb;
            border-radius: 8px; padding: 12px;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; position: relative;
        }
        .price-label input { position: absolute; top: 10px; left: 10px; width: 16px; height: 16px; accent-color: #e6683c;}
        .price-label .weight { font-size: 14px; color: #8e8e8e; margin-top: 10px; margin-bottom: 5px; }
        .price-label .price { font-size: 16px; font-weight: 700; color: #262626; }

        /* Formulário de Dados */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #262626; margin-bottom: 5px; }
        .form-group input {
            width: 100%; padding: 12px;
            background: #fafafa; border: 1px solid #dbdbdb;
            border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif;
        }
        
        /* Campo visual de Select (Trigger do Modal) */
        .select-trigger {
            width: 100%; padding: 12px;
            background: #fafafa; border: 1px solid #dbdbdb;
            border-radius: 6px; font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }

        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        /* Botão Fixo */
        .whatsapp-btn-container {
            position: fixed; bottom: 0; width: 100%; max-width: 414px;
            background: #ffffff; padding: 15px 20px;
            border-top: 1px solid #dbdbdb; z-index: 20;
        }
        .whatsapp-btn {
            display: block; width: 100%; padding: 14px;
            text-align: center; color: #ffffff; font-weight: 600;
            font-size: 16px; border-radius: 8px; border: none; cursor: pointer;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        /* MODAL ESTILO INSTAGRAM */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100;
            display: none; align-items: flex-end; justify-content: center;
        }
        .modal-content {
            width: 100%; max-width: 414px;
            background: #fff; border-radius: 12px 12px 0 0;
            animation: slideUp 0.3s ease-out;
            padding-bottom: 20px;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header {
            width: 100%; height: 40px; display: flex; justify-content: center; align-items: center;
        }
        .modal-drag-handle { width: 40px; height: 4px; background: #dbdbdb; border-radius: 2px; }
        
        .modal-option {
            width: 100%; padding: 16px; text-align: center;
            font-size: 16px; border-bottom: 1px solid #efefef;
            cursor: pointer; color: #262626;
        }
        .modal-option.active { font-weight: 700; color: #e6683c; }
        .modal-option:last-child { border-bottom: none; color: #ed4956; font-weight: 600; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1>Dessa's Bakery</h1>
        </header>

        <main class="content">
            
            <h2 class="section-title">1. Monte seu Bolo</h2>
            <div class="card">
                <h3 class="category-title"><span class="ig-gradient-text">✦</span> Massas</h3>
                <div class="item-list">
                    <label><input type="checkbox" name="massa" value="Chiffon Branca"> Chiffon Branca</label>
                    <label><input type="checkbox" name="massa" value="Chiffon de Chocolate"> Chiffon de Chocolate</label>
                    <label><input type="checkbox" name="massa" value="Chiffon de Laranja"> Chiffon de Laranja</label>
                    <label><input type="checkbox" name="massa" value="Chiffon mesclada"> Chiffon mesclada</label>
                    <label><input type="checkbox" name="massa" value="Não sei"> Não sei</label>
                </div>

                <h3 class="category-title"><span class="ig-gradient-text">✦</span> Recheios</h3>
                <div class="item-list">
                    <label><input type="checkbox" name="recheio" value="Brigadeiro"> Brigadeiro</label>
                    <label><input type="checkbox" name="recheio" value="Morango"> Morango</label>
                    <label><input type="checkbox" name="recheio" value="Ninho"> Ninho</label>
                    <label><input type="checkbox" name="recheio" value="Beijinho"> Beijinho</label>
                    <label><input type="checkbox" name="recheio" value="Frutas Tropical"> Frutas Tropical</label>
                    <label><input type="checkbox" name="recheio" value="Coco com Ameixa"> Coco com Ameixa</label>
                    <label><input type="checkbox" name="recheio" value="Chocolate"> Chocolate</label>
                    <label><input type="checkbox" name="recheio" value="Paçoca"> Paçoca</label>
                    <label><input type="checkbox" name="recheio" value="Belga com Abacaxi"> Belga com Abacaxi</label>
                    <label><input type="checkbox" name="recheio" value="Coco com Abacaxi"> Coco com Abacaxi</label>
                </div>

                <h3 class="category-title"><span class="ig-gradient-text">✦</span> Coberturas</h3>
                <div class="item-list" style="margin-bottom: 0;">
                    <label><input type="checkbox" name="cobertura" value="Chantilly"> Chantilly</label>
                    <label><input type="checkbox" name="cobertura" value="Glacê de Açúcar"> Glacê de Açúcar</label>
                    <label><input type="checkbox" name="cobertura" value="Nenhuma"> Nenhuma</label>
                </div>
            </div>

            <h2 class="section-title">2. Tamanhos e Valores</h2>
            <div class="price-grid" style="margin-bottom: 25px;">
                <label class="price-label">
                    <input type="checkbox" name="tamanho" value="1 kg (R$80)">
                    <span class="weight">Bolo 1 kg</span>
                    <span class="price">R$ 80</span>
                </label>
                <label class="price-label">
                    <input type="checkbox" name="tamanho" value="2 kg (R$150)">
                    <span class="weight">Bolo 2 kg</span>
                    <span class="price">R$ 150</span>
                </label>
                <label class="price-label">
                    <input type="checkbox" name="tamanho" value="3 kg (R$220)">
                    <span class="weight">Bolo 3 kg</span>
                    <span class="price">R$ 220</span>
                </label>
                <label class="price-label">
                    <input type="checkbox" name="tamanho" value="4 kg (R$290)">
                    <span class="weight">Bolo 4 kg</span>
                    <span class="price">R$ 290</span>
                </label>
            </div>

            <h2 class="section-title">3. Dados da Encomenda</h2>
            <div class="card">
                <div class="form-group">
                    <label>Seu Nome</label>
                    <input type="text" id="cliente_nome" placeholder="Como podemos te chamar?">
                </div>
                
                <div class="form-group">
                    <label>Tipo de Entrega</label>
                    <div class="select-trigger" onclick="openModal()">
                        <span id="entrega_texto">Vou retirar no local</span>
                        <span style="font-size: 10px; color: #8e8e8e;">▼</span>
                    </div>
                    <input type="hidden" id="tipo_entrega_val" value="Retirada">
                </div>

                <div class="form-group">
                    <label>Endereço completo (se for entrega)</label>
                    <input type="text" id="cliente_endereco" placeholder="Rua, número, bairro...">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Agendar em</label>
                        <input type="date" id="cliente_data">
                    </div>
                    <div class="form-group">
                        <label>Horário</label>
                        <input type="time" id="cliente_hora">
                    </div>
                </div>
            </div>

        </main>

        <div class="whatsapp-btn-container">
            <button class="whatsapp-btn" onclick="enviarPedido()">Faça seu Pedido</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalEntrega" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header"><div class="modal-drag-handle"></div></div>
            <div class="modal-option" onclick="selectOption('Retirada', 'Vou retirar no local')">Vou retirar no local</div>
            <div class="modal-option" onclick="selectOption('Entrega', 'Quero que entregue (Entrega)')">Quero que entregue (Entrega)</div>
            <div class="modal-option" onclick="closeModal()">Cancelar</div>
        </div>
    </div>

    <script>
        // Funções do Modal
        function openModal() { document.getElementById('modalEntrega').style.display = 'flex'; }
        function closeModal() { document.getElementById('modalEntrega').style.display = 'none'; }
        
        function selectOption(val, text) {
            document.getElementById('tipo_entrega_val').value = val;
            document.getElementById('entrega_texto').innerText = text;
            closeModal();
        }

        function enviarPedido() {
            const nome = document.getElementById('cliente_nome').value;
            const tipoEntrega = document.getElementById('tipo_entrega_val').value;
            const endereco = document.getElementById('cliente_endereco').value;
            let data = document.getElementById('cliente_data').value;
            const hora = document.getElementById('cliente_hora').value;

            if(data) {
                const partesData = data.split('-');
                data = `${partesData[2]}/${partesData[1]}/${partesData[0]}`;
            }

            if (!nome) {
                alert("Por favor, preencha o seu nome!");
                document.getElementById('cliente_nome').focus();
                return;
            }

            const getSelecionados = (nomeDoCampo) => {
                const marcados = document.querySelectorAll(`input[name="${nomeDoCampo}"]:checked`);
                let valores = [];
                marcados.forEach((checkbox) => {
                    valores.push(checkbox.value);
                });
                return valores.length > 0 ? valores.join(', ') : 'Não selecionado';
            };

            const massa = getSelecionados('massa');
            const recheio = getSelecionados('recheio');
            const cobertura = getSelecionados('cobertura');
            const tamanho = getSelecionados('tamanho');

            let mensagem = `*NOVA ENCOMENDA - Dessa's Bakery* 🧁\n\n`;
            
            mensagem += `*👤 CLIENTE:*\n`;
            mensagem += `Nome: ${nome}\n`;
            mensagem += `Tipo: ${tipoEntrega}\n`;
            if(tipoEntrega === 'Entrega') {
                mensagem += `Endereço: ${endereco || 'Não informado'}\n`;
            }
            mensagem += `Agendado para: ${data || 'Não informado'} às ${hora || 'Não informado'}\n\n`;
            
            mensagem += `*🎂 DETALHES DO BOLO:*\n`;
            mensagem += `Tamanho: ${tamanho}\n`;
            mensagem += `Massa: ${massa}\n`;
            mensagem += `Recheio(s): ${recheio}\n`;
            mensagem += `Cobertura: ${cobertura}\n\n`;
            
            mensagem += `Tenho interesse nessa encomenda!`;

            const url = `https://wa.me/5515981463360?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
